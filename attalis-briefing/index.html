<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attalis Briefing</title>
  <style>
    :root{--bg:#0d0c0a;--panel:#15130f;--panel2:#1c1913;--gold:#c9a84c;--text:#e8e4dc;--muted:#8b8578;--line:rgba(201,168,76,.16);--red:#b56a5b;--green:#6a9b5b;--blue:#5b87b5;--purple:#8a6ab5}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:inherit}.wrap{max-width:1120px;margin:0 auto;padding:28px 22px 56px}.mast{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:20px;display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.eyebrow{font-size:11px;color:var(--gold);font-weight:800;letter-spacing:4px;text-transform:uppercase}.title{font-family:Georgia,serif;font-style:italic;font-size:42px;line-height:1;margin:8px 0 10px}.sub{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);font-size:12px}.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--muted);padding:9px 12px;border-radius:7px;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;cursor:pointer}.btn.active{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.1);color:var(--gold)}.ticker{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-bottom:22px}.tick{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:11px}.tick small{display:block;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.8px}.tick b{display:block;margin-top:4px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.tick span{font-size:11px;font-weight:700}.up{color:var(--green)}.down{color:var(--red)}.lead{background:linear-gradient(135deg,rgba(201,168,76,.11),rgba(201,168,76,.025));border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:26px}.tag{display:inline-flex;gap:6px;align-items:center;color:var(--gold);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase}.lead h2{font-family:Georgia,serif;font-size:27px;line-height:1.18;margin:9px 0 10px}.brief{color:#c9c2b6;line-height:1.7;margin:0}.angle{margin-top:13px;border:1px solid rgba(201,168,76,.16);background:rgba(201,168,76,.055);border-radius:10px;padding:12px 14px;color:#d9c77b;font-size:13px;line-height:1.6}.grid{display:grid;grid-template-columns:1fr;gap:22px}.section{margin-top:4px}.sectionHead{display:flex;align-items:center;gap:12px;margin-bottom:12px}.sectionHead h3{margin:0;color:var(--gold);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase}.rule{height:1px;flex:1;background:linear-gradient(90deg,var(--line),transparent)}.card{border-left:3px solid var(--gold);background:rgba(255,255,255,.025);border-radius:0 12px 12px 0;padding:15px 17px;margin-bottom:10px}.card summary{cursor:pointer;list-style:none}.card summary::-webkit-details-marker{display:none}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}.pill{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;font-weight:800;color:var(--gold);background:rgba(201,168,76,.11);padding:3px 7px;border-radius:5px;text-decoration:none}.card h4{font-family:Georgia,serif;font-size:18px;line-height:1.3;margin:0 0 5px}.card p{color:#aaa398;line-height:1.65;margin:0;font-size:14px}.expanded{border-top:1px solid rgba(255,255,255,.06);margin-top:12px;padding-top:12px}.sources{margin-top:10px;font-size:12px;color:var(--muted)}.empty{border:1px dashed rgba(255,255,255,.12);border-radius:14px;padding:30px;text-align:center;color:var(--muted)}.foot{margin-top:28px;border-top:1px solid rgba(255,255,255,.05);padding-top:16px;color:#4d4941;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.hidden{display:none}@media(max-width:760px){.mast{display:block}.controls{justify-content:flex-start;margin-top:16px}.ticker{grid-template-columns:repeat(2,minmax(0,1fr))}.title{font-size:34px}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="mast">
      <div>
        <div class="eyebrow">Attalis Capital</div>
        <h1 class="title">Briefing Archive</h1>
        <div class="sub" id="dateLine">Loading latest briefing…</div>
      </div>
      <nav class="controls">
        <button class="btn active" data-filter="all">All</button>
        <button class="btn" data-filter="daily">Daily</button>
        <button class="btn" data-filter="weekly">Weekly</button>
      </nav>
    </header>

    <section class="ticker" id="ticker"></section>
    <section id="lead"></section>
    <section class="grid" id="sections"></section>
    <section class="foot">Generated from prior-day / prior-week source scans. Email delivery runs separately at 6:00am Sydney time.</section>
  </main>

<script>
const sectionLabels={deals:'M&A & Deals',pe:'Private Equity',markets:'Markets & Macro',ipo:'IPO Pipeline',tech:'AI & Tech',au:'Australia',people:'People Moves',weekAhead:'Week Ahead'};
const sectionColours={deals:'#c9a84c',pe:'#6a9b5b',markets:'#5b87b5',ipo:'#b56a5b',tech:'#8a6ab5',au:'#b59a5b',people:'#5bb5a8',weekAhead:'#c9a84c'};
let current=null;
async function loadBrief(){
  try{
    const res=await fetch('./data/latest.json',{cache:'no-store'});
    if(!res.ok) throw new Error('No latest.json found');
    current=await res.json();
    render(current);
  }catch(e){
    document.getElementById('sections').innerHTML='<div class="empty">No briefing has been published yet. The 6:00am automation will populate this archive after the first run.</div>';
    document.getElementById('dateLine').textContent='Awaiting first automated briefing';
  }
}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function render(data){
  document.getElementById('dateLine').textContent=`${data.type||'Briefing'} · ${data.period||data.date||''} · Published ${data.generatedAt||''}`;
  renderTicker(data.marketSnapshot||{}); renderLead(data.leadStory); renderSections(data.sections||{},data.weekAhead||[]);
}
function renderTicker(m){
  const items=[['ASX 200',m.asx200],['S&P 500',m.sp500],['AUD/USD',m.audusd],['10Y AGB',m.aus10y],['BTC',m.bitcoin],['Iron Ore',m.ironOre]].filter(x=>x[1]);
  document.getElementById('ticker').innerHTML=items.map(([label,v])=>`<div class="tick"><small>${esc(label)}</small><b>${esc(v.value)}</b><span class="${v.direction==='up'?'up':'down'}">${v.direction==='up'?'▲':'▼'} ${esc(v.change||'')}</span></div>`).join('');
}
function renderLead(story){
  const el=document.getElementById('lead');
  if(!story){el.innerHTML='';return}
  el.innerHTML=`<article class="lead"><div class="tag">Lead Story ${story.source?`· ${esc(story.source)}`:''} ${story.dealValue?`· ${esc(story.dealValue)}`:''}</div><h2>${esc(story.headline)}</h2><p class="brief">${esc(story.analysis||story.brief)}</p>${story.attalisAngle?`<div class="angle"><b>ATTALIS ANGLE</b> — ${esc(story.attalisAngle)}</div>`:''}${story.url?`<div class="sources"><a href="${esc(story.url)}" target="_blank" rel="noopener">Open source ↗</a></div>`:''}</article>`;
}
function card(story,colour){
  const sourceLink=story.url?`<a class="pill" href="${esc(story.url)}" target="_blank" rel="noopener">${esc(story.source||'Source')} ↗</a>`:`<span class="pill">${esc(story.source||'Source')}</span>`;
  return `<details class="card" style="border-left-color:${colour}"><summary><div class="meta">${sourceLink}${story.dealValue?`<span class="pill">${esc(story.dealValue)}</span>`:''}${story.priority==='high'?'<span class="pill">KEY STORY</span>':''}</div><h4>${esc(story.headline)}</h4><p>${esc(story.brief)}</p></summary><div class="expanded"><p>${esc(story.analysis||'')}</p>${story.attalisAngle?`<div class="angle"><b>ATTALIS ANGLE</b> — ${esc(story.attalisAngle)}</div>`:''}</div></details>`;
}
function renderSections(sections,weekAhead){
  const blocks=[];
  Object.keys(sectionLabels).forEach(k=>{
    const arr=k==='weekAhead'?weekAhead:(sections[k]||[]); if(!arr.length) return;
    const colour=sectionColours[k];
    blocks.push(`<section class="section"><div class="sectionHead"><h3>${sectionLabels[k]}</h3><div class="rule"></div></div>${arr.map(s=>card(s,colour)).join('')}</section>`);
  });
  document.getElementById('sections').innerHTML=blocks.join('')||'<div class="empty">No stories available.</div>';
}
document.querySelectorAll('.btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const f=btn.dataset.filter;if(!current)return;if(f==='all'){render(current);return}if(current.type?.toLowerCase()===f){render(current)}else{document.getElementById('lead').innerHTML='';document.getElementById('ticker').innerHTML='';document.getElementById('sections').innerHTML='<div class="empty">Latest published briefing is not this type. The automation will overwrite latest.json on the next matching run.</div>'}}));
loadBrief();
</script>
</body>
</html>
